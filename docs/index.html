<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Global OEM System Stack — Interactive</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
  <header>
    <div class="titlebar">
      <h1>Global OEM System Stack</h1>
      <div class="tabs">
        <button id="tab-grid" class="tab active">Grid</button>
        <button id="tab-network" class="tab">Network</button>
      </div>
    </div>

    <div class="controls">
      <label>Region
        <select id="region"></select>
      </label>
      <label>OEM Group
        <select id="oem"></select>
      </label>
      <label>Layer
        <select id="layer"></select>
      </label>
      <label>Type
        <select id="type"></select>
      </label>
      <label>Confidence
        <select id="confidence"></select>
      </label>
      <label>Search
        <input id="search" type="search" placeholder="e.g., Denso, MIIT, Tesla OS" />
      </label>
      <button id="reset">Reset</button>
    </div>

    <div class="toggles">
      <label class="toggle">
        <input type="checkbox" id="telemetryOnly" />
        <span>Telemetry paths only</span>
      </label>
      <label style="margin-left:16px;">
        <input type="checkbox" id="evidenceOnly" />
        <span>Evidence Only (Verified)</span>
        </label>
      </div>
  </header>

  <main>
    <div id="viz"></div>
    <div id="tooltip" class="tooltip" style="display:none;"></div>
  </main>

  <footer>
    <span>Data: docs/data/nodes.csv + docs/data/edges.csv</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
