<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OEM System Stack Intelligence — Interactive</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GCC1GCHL4"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-9GCC1GCHL4');
  </script>
</head>
<body>
  <header>
    <div class="titlebar">
      <h1>OEM System Stack Intelligence</h1>
      <div class="tabs">
        <button id="tab-grid" class="tab active">Grid</button>
        <button id="tab-network" class="tab">Network</button>
        <button id="tab-architecture" class="tab" type="button">Architecture</button>
        <button id="tab-governance" class="tab" type="button">Governance</button>
      </div>
    </div>

    <div class="controls">
      <label>Region
        <select id="region"></select>
      </label>
      <label>OEM Group
        <select id="oem"></select>
      </label>
      <label>Layer
        <select id="layer"></select>
      </label>
      <label>Type
        <select id="type"></select>
      </label>
      <label>Confidence
        <select id="confidence"></select>
      </label>
      <label>Search
        <input id="search" type="search" placeholder="e.g., Denso, MIIT, Tesla OS" />
      </label>
      <button id="reset">Reset</button>
    </div>

    <div class="toggles">
      <label class="toggle">
        <input type="checkbox" id="telemetryOnly" />
        <span>Telemetry Paths Only</span>
      </label>
      <label style="margin-left:12px;">
        <input type="checkbox" id="evidenceOnly" />
        Evidence Only (VERIFIED)
      </label>
      <label style="margin-left:12px;">
        <input type="checkbox" id="archTight" />
        Architecture Tight Mode
      </label>
      </div>
  </header>

  <main>
    <div id="viz"></div>
    <div id="tooltip" class="tooltip" style="display:none;"></div>
  </main>

  <footer style="margin-top:40px;padding:20px 0;text-align:center;font-size:12px;opacity:0.8;border-top:1px solid rgba(255,255,255,.1)">
    Created 2026 by <a href="https://www.mrleeco.com/" target="_blank" style="color:#2563EB;text-decoration:none;">Mr Lee Co</a><br/>
    Developer: <a href="https://www.linkedin.com/in/christopherjustinlee/" target="_blank" style="color:#2563EB;text-decoration:none;">Chris Lee</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
